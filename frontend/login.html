<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login • Biblioteca</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root{
      --g1:#2f7d52;
      --g2:#eef7f0;
      --g3:#a5d2bab9;
    }
    body { background: var(--g2); }
    .card { border-radius: 18px; border: 1px solid var(--g3); }
    .btn-success { background: var(--g1); border-color: var(--g1); }
    .form-control, .form-select { border-radius: 12px; }
  </style>
</head>
<body>
  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm">
          <div class="card-body p-4">
            <h3 class="mb-1">Biblioteca</h3>
            <p class="text-muted mb-4">Entre para acessar o sistema</p>

            <form id="loginForm">
              <div class="mb-3">
                <label class="form-label">Email</label>
                <input class="form-control" name="email" type="email" required placeholder="nome@dominio.com" />
              </div>

              <div class="mb-3">
                <label class="form-label">Senha</label>
                <input class="form-control" name="senha" type="password" required />
              </div>

              <div class="mb-3">
                <label class="form-label">Tipo</label>
                <select class="form-select" name="tipo" required>
                  <option>ADMIN</option>
                  <option>BIBLIOTECARIO</option>
                  <option selected>ALUNO</option>
                  <option>VISITANTE</option>
                </select>
              </div>

              <div class="d-grid">
                <button class="btn btn-success" type="submit">Entrar</button>
              </div>

              <button class="btn btn-outline-success mt-2 w-100" type="button" id="btnCadastro">
                Criar conta (Aluno/Visitante)
              </button>

              <div class="alert alert-danger mt-3 d-none" id="err"></div>
            </form>

          </div>
        </div>
      </div>
    </div>
  </main>

<script>
const API = "http://127.0.0.1:3000/api";
const form = document.getElementById("loginForm");
const err = document.getElementById("err");

document.getElementById("btnCadastro").addEventListener("click", () => {
  window.open("./cadastro.html", "_blank");
});

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  err.classList.add("d-none");

  const data = Object.fromEntries(new FormData(form).entries());

  try {
    const res = await fetch(API + "/auth/login", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify(data)
    });

    const body = await res.json().catch(()=>null);
    if (!res.ok) throw new Error(body?.error || "Falha no login");

    localStorage.setItem("user", JSON.stringify(body.user));
    window.location.href = "./index.html";
  } catch (e2) {
    err.textContent = e2.message;
    err.classList.remove("d-none");
  }
});
</script>
</body>
</html>
