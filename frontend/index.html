<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Biblioteca</title>

  <!-- ajuda no desenvolvimento (evita cache agressivo do navegador) -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    :root{
      --g1:#2f7d52;
      --g2:#eef7f0;
      --g3:#bce3ce;
      --g4:#ec8ae1;
    }
    body{ background: var(--g2); }
    .navbar{ background: var(--g1) !important; }
    .brand{ font-weight: 700; letter-spacing: .2px; }
    .cardish{ background: #fff; border: 1px solid var(--g3); border-radius: 18px; }
    .nav-tabs .nav-link{ color:#1f4d35; border-top-left-radius: 14px; border-top-right-radius: 14px; }
    .nav-tabs .nav-link.active{
      background:#c0ffb8;
      border-color: var(--g3) var(--g3) #fff;
      color:#1f4d35;
      font-weight: 600;
    }
    .btn-success{ background: var(--g1); border-color: var(--g1); }
    .btn-outline-secondary{ border-color:#9dbfae; color:#2b5a41; }
    .table thead th{ background: var(--g4); }
    .shadow-soft{ box-shadow: 0 .5rem 1.2rem rgba(0,0,0,.06)!important; }
  </style>
</head>

<body>
  <nav class="navbar navbar-dark">
    <div class="container d-flex justify-content-between">
      <span class="navbar-brand mb-0 brand">Biblioteca</span>
      <div class="d-flex align-items-center gap-2">
        <span class="text-white-50 small" id="who"></span>
        <button class="btn btn-light btn-sm" id="btnLogout" type="button">Sair</button>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <ul class="nav nav-tabs" id="tabs">
      <li class="nav-item"><button class="nav-link active" type="button" id="tab-livros" data-tab="livros">Livros</button></li>
      <li class="nav-item"><button class="nav-link" type="button" id="tab-usuarios" data-tab="usuarios">Usuários</button></li>
      <li class="nav-item"><button class="nav-link" type="button" id="tab-emprestimos" data-tab="emprestimos">Empréstimos</button></li>
      <li class="nav-item"><button class="nav-link" type="button" id="tab-reservas" data-tab="reservas">Reservas</button></li>
    </ul>

    <div class="cardish border-top-0 p-3 rounded-bottom shadow-soft">
      <div class="d-flex gap-2 flex-wrap mb-3">
        <button class="btn btn-success" id="btnNovo" type="button">+ Novo</button>
        <button class="btn btn-outline-secondary" id="btnReload" type="button">Recarregar</button>
        <div class="ms-auto text-muted" id="status"></div>
      </div>

      <div id="content"></div>

    </div>
  </main>

  <!-- Modal genérico -->
  <div class="modal fade" id="modal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <form class="modal-content" id="form">
        <div class="modal-header">
          <h5 class="modal-title" id="modalTitle">Novo</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body" id="modalBody"></div>

        <div class="modal-footer">
          <button class="btn btn-secondary" type="button" data-bs-dismiss="modal">Cancelar</button>
          <button class="btn btn-success" type="submit">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
