<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cadastro • Biblioteca</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root{ --g1:#2f7d52; --g2:#eef7f0; --g3:#cfe9db; }
    body { background: var(--g2); }
    .card { border-radius: 18px; border: 1px solid var(--g3); }
    .btn-success { background: var(--g1); border-color: var(--g1); }
    .form-control, .form-select { border-radius: 12px; }
  </style>
</head>
<body>
  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-7 col-lg-6">
        <div class="card shadow-sm">
          <div class="card-body p-4">
            <h3 class="mb-1">Criar conta</h3>
            <p class="text-muted mb-4">Somente Aluno ou Visitante.</p>

            <form id="cadForm">
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label">Nome</label>
                  <input class="form-control" name="nome" required />
                </div>

                <div class="col-md-6">
                  <label class="form-label">Tipo</label>
                  <select class="form-select" name="tipo" required>
                    <option selected>ALUNO</option>
                    <option>VISITANTE</option>
                  </select>
                </div>

                <div class="col-12">
                  <label class="form-label">Email</label>
                  <input class="form-control" name="email" type="email" required placeholder="nome@dominio.com" />
                </div>

                <div class="col-12">
                  <label class="form-label">Senha</label>
                  <input class="form-control" name="senha" type="password" required />
                </div>
              </div>

              <div class="d-grid mt-3">
                <button class="btn btn-success" type="submit">Cadastrar</button>
              </div>

              <div class="alert alert-danger mt-3 d-none" id="err"></div>
              <div class="alert alert-success mt-3 d-none" id="ok">
                Conta criada! Redirecionando para o login...
              </div>
            </form>

          </div>
        </div>
      </div>
    </div>
  </main>

<script>
const API = "http://127.0.0.1:3000/api";
const form = document.getElementById("cadForm");
const err = document.getElementById("err");
const ok = document.getElementById("ok");

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  err.classList.add("d-none");
  ok.classList.add("d-none");

  const data = Object.fromEntries(new FormData(form).entries());

  try {
    const res = await fetch(API + "/usuarios", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify(data)
    });

    const body = await res.json().catch(()=>null);
    if (!res.ok) throw new Error(body?.error || "Falha ao cadastrar");

    ok.classList.remove("d-none");
    setTimeout(() => {
      window.location.href = "./login.html";
    }, 1200);

  } catch (e2) {
    err.textContent = e2.message;
    err.classList.remove("d-none");
  }
});
</script>
</body>
</html>
